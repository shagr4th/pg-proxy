name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  GO_VERSION: '1.25'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: ${{ gitea.event.repository.name }}-linux-amd64
          - goos: windows
            goarch: amd64
            asset_name: ${{ gitea.event.repository.name }}-windows-amd64.exe
          - goos: aix
            goarch: ppc64
            asset_name: ${{ gitea.event.repository.name }}-aix-ppc64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Go toolchain + modules + build cache
        uses: actions/cache@v3
        with:
          path: |
            /usr/local/go
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ env.GO_VERSION }}-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ env.GO_VERSION }}-${{ runner.os }}-
            go-${{ env.GO_VERSION }}-

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-X main.commit=${{ gitea.ref_name }}" \
            -trimpath \
            -o ${{ matrix.asset_name }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: ./artifacts

      - name: Flatten artifacts into release dir
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;

      - name: Create checksums
        working-directory: release
        run: sha256sum * > checksums.txt

      - name: Create release
        uses: https://gitea.com/actions/gitea-release-action@main
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          tag: ${{ gitea.ref_name }}
          name: ${{ gitea.ref_name }}
          body: |
            ## ${{ gitea.ref_name }}

            ### Downloads
            | Platform      | Architecture | File                                      |
            |---------------|--------------|-------------------------------------------|
            | Linux         | x86_64       | `${{ gitea.event.repository.name }}-linux-amd64`                           |
            | Windows       | x86_64       | `${{ gitea.event.repository.name }}-windows-amd64.exe`                     |
            | AIX           | ppc64        | `${{ gitea.event.repository.name }}-aix-ppc64`                             |

            ### Verify integrity
            ```sh
            sha256sum -c checksums.txt
            ```
          files: |
            release/*
          draft: false
          prerelease: ${{ contains(gitea.ref_name, '-') }}